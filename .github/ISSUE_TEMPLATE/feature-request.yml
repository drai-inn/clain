name: Feature request
description: Propose a new capability or change in behaviour.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature. Non-trivial features become specs via the contributor workflow — see [CONTRIBUTING.md](https://github.com/drai-inn/clain/blob/main/CONTRIBUTING.md). This issue captures the initial proposal; the spec captures the design once we agree it's worth doing.
  - type: dropdown
    id: goal
    attributes:
      label: Which INTENT goal does this serve?
      description: See [INTENT.md](https://github.com/drai-inn/clain/blob/main/INTENT.md). If "none of the above", say so in the description and we'll discuss whether INTENT needs to change.
      options:
        - "Goal 1 — Categorical visibility"
        - "Goal 2 — Deliberate execution"
        - "Goal 3 — Two action categories"
        - "Goal 4 — Deliberate consolidation"
        - "Goal 5 — Reuse by default"
        - "Goal 6 — Portability"
        - "Goal 7 — Honest sync hygiene"
        - "Goal 8 — Version-controlled, reviewable evolution"
        - "None of the above (INTENT may need to change)"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: |
        Today, when I ... clain ... and the result is ...
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed approach
      description: A sketch. Doesn't need to be a finished design — the spec phase covers that.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other shapes you thought about and why you didn't choose them.
    validations:
      required: false
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: Things deliberately *not* covered by this proposal, to keep its boundary clean.
    validations:
      required: false

name: Bug report
description: Something doesn't work the way clain says it should.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please include enough detail that someone can reproduce the issue.

        For open-ended questions, please use [Discussions](https://github.com/drai-inn/clain/discussions) instead.
  - type: input
    id: version
    attributes:
      label: clain version
      description: Output of `pixi run clain --version`.
      placeholder: "clain 0.0.1"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Other (describe in "What happened")
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you ran and what you saw.
      placeholder: |
        I ran `pixi run clain plan recreate ~/dev/foo --dry` and ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: |
        A short fixture tree, the exact commands run, and the relevant output.
        Please anonymise any personal paths or email addresses before pasting.
    validations:
      required: false
  - type: input
    id: rules-toml-changes
    attributes:
      label: Have you modified src/clain/rules.toml?
      placeholder: "No, using the upstream rule base"
    validations:
      required: false

# clain rule base — data-driven definition of class membership and recreate rules.
#
# Editable by hand or by genAI. Schema is versioned (`schema` field). Loader
# (src/clain/rules_loader.py) validates structure and refuses to load if a
# directory name appears in more than one class.
#
# Adding a new class or recreate rule is a normal source change subject to PR
# review. The acceptance criteria for such a PR include: (a) the test
# `test_rules_loader_validates` still passes, (b) any new ecosystem entry has a
# corresponding placement entry (or a spec amendment that says why not),
# (c) the rationale for the addition is in the PR description.

schema = 1

# ----- Classes -------------------------------------------------------------------------
# Each entry defines one class. Directory names are the *identity* of the class;
# `default_action` is consumed by `clain plan recreate` to choose between
# delete-only and delete-and-recreate.

[[classes]]
name = "cache-managed"
description = "Regenerable by a package manager from a manifest. Belongs in a single store per ecosystem, outside the synced tree."
default_action = "delete-and-recreate"
directory_names = ["node_modules", ".venv", "venv", "site-packages"]

[[classes]]
name = "ephemeral"
description = "Build output, regenerated by the normal build step."
default_action = "delete"
directory_names = ["dist", "build", ".next", ".cache"]

[[classes]]
name = "bytecode"
description = "Bytecode or tool cache, regenerated on the next run."
default_action = "delete"
directory_names = ["__pycache__", ".mypy_cache", ".ruff_cache", ".pytest_cache"]


# ----- Manifests to detect at workspace root -------------------------------------------
# Recorded by `clain classify` for use by downstream plan commands. Includes
# both recreate-related manifests and integrity-related files (Dockerfile,
# .envrc, etc.) that the move plan reads during smoke tests.

[manifests]
detect = [
    "pyproject.toml",
    "package.json",
    "requirements.txt",
    "pixi.toml",
    "uv.lock",
    "pnpm-lock.yaml",
    "package-lock.json",
    "yarn.lock",
    "Pipfile",
    "Pipfile.lock",
    "Dockerfile",
    "docker-compose.yml",
    "docker-compose.yaml",
    ".envrc",
]


# ----- Recreate rules ------------------------------------------------------------------
# Manifest → command mapping. Lower `priority` wins when multiple manifests
# match in the same workspace (so `pixi.toml` beats raw `pyproject.toml`).
# `safe = false` rules emit a command for documentation but flag the action as
# unsafe-to-execute even when the phase gate is lifted.

[[recreate_rules]]
manifest = "pixi.toml"
command = "pixi install"
ecosystem = "pixi"
priority = 10
safe = true

[[recreate_rules]]
manifest = "uv.lock"
command = "uv sync"
ecosystem = "uv"
priority = 20
safe = true

[[recreate_rules]]
manifest = "pnpm-lock.yaml"
command = "pnpm install --frozen-lockfile"
ecosystem = "pnpm"
priority = 10
safe = true

[[recreate_rules]]
manifest = "package-lock.json"
command = "npm ci"
ecosystem = "npm"
priority = 20
safe = true

[[recreate_rules]]
manifest = "yarn.lock"
command = "yarn install --frozen-lockfile"
ecosystem = "yarn"
priority = 30
safe = true

# Ambiguous fallbacks — match only when no higher-priority rule fires.
[[recreate_rules]]
manifest = "pyproject.toml"
command = "# ambiguous: pick one of pixi/uv/poetry, then re-run plan"
ecosystem = "python-ambiguous"
priority = 90
safe = false
unsafe_reason = "ambiguous Python toolchain — workspace has pyproject.toml but no pixi.toml / uv.lock / poetry.lock"

[[recreate_rules]]
manifest = "requirements.txt"
command = "# ambiguous: pin a toolchain (uv pip / pip), then re-run plan"
ecosystem = "python-pip"
priority = 92
safe = false
unsafe_reason = "requirements.txt present but no toolchain lockfile"

[[recreate_rules]]
manifest = "package.json"
command = "# unsafe: no lockfile, recreate would resolve fresh versions"
ecosystem = "node-no-lock"
priority = 95
safe = false
unsafe_reason = "package.json without a lockfile — recreate would resolve fresh versions"


# ----- Ecosystem placements ------------------------------------------------------------
# Where each ecosystem's shared store should live (outside the synced tree) and
# how to configure it. Cited with `doc_url` so reviewers can verify advice
# hasn't gone stale.

[[placements]]
ecosystem = "pnpm"
store_advice = "~/Library/pnpm/store on macOS — single content-addressable store shared across all projects."
configure_via = "pnpm config set store-dir ~/Library/pnpm/store (or ~/.npmrc: store-dir=...)"
doc_url = "https://pnpm.io/configuring#store-dir"

[[placements]]
ecosystem = "npm"
store_advice = "npm has no shared store; migrate to pnpm or yarn-berry PnP to get one."
configure_via = "(no equivalent of pnpm's store-dir for classic npm)"
doc_url = "https://pnpm.io/motivation"

[[placements]]
ecosystem = "yarn"
store_advice = "Yarn Berry's PnP mode avoids per-project node_modules entirely; classic yarn does not."
configure_via = "yarn set version berry && yarn config set nodeLinker pnp"
doc_url = "https://yarnpkg.com/features/pnp"

[[placements]]
ecosystem = "pixi"
store_advice = "Pixi keeps per-project envs under .pixi/envs/ but shares a package cache. Workspace-local .pixi/ must live outside the synced tree (i.e. the whole workspace must be in ~/dev/, not in GDrive)."
configure_via = "PIXI_CACHE_DIR env var (defaults to ~/.cache/rattler/cache on macOS)"
doc_url = "https://pixi.sh/latest/reference/cli/"

[[placements]]
ecosystem = "uv"
store_advice = "~/.cache/uv — single cache, content-addressed, shared across all projects."
configure_via = "UV_CACHE_DIR env var (default: ~/.cache/uv)"
doc_url = "https://docs.astral.sh/uv/reference/settings/#cache-dir"

[[placements]]
ecosystem = "poetry"
store_advice = "~/Library/Caches/pypoetry/virtualenvs on macOS. Poetry stores virtualenvs centrally rather than in-project by default."
configure_via = "poetry config virtualenvs.path"
doc_url = "https://python-poetry.org/docs/configuration/"
